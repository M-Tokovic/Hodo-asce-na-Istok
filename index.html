<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>М. Токовић - Ходочашће на Исток</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100vh; width: 100%; overflow-x: hidden; font-family: 'Times New Roman', serif; background-color: #1a1a1a; }
        body { background-image: url('p.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        .mrak { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }

        /* RUKA NA SVEMU ŠTO SE KLIKĆE */
        .zastava-link, .ikona-kontejner, .ikona-baza, .slika-okvir { cursor: pointer !important; }

        .blok-levo { position: fixed; top: 30px; left: 30px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .lopta-lice { width: 120px; height: 120px; border-radius: 50%; background: url('j.jpg') center/cover; border: 3px solid silver; box-shadow: 0 0 25px white; animation: rotacija 12s linear infinite; }
        #sat-prikaz { color: white; font-size: 1.2em; font-weight: bold; text-shadow: 2px 2px 5px #000; margin-top: 30px; }

        .blok-desno { position: fixed; top: 30px; right: 30px; display: flex; flex-direction: column; align-items: center; z-index: 20; }
        .zastave { display: flex; gap: 15px; margin-bottom: 10px; }
        .zastava-link { width: 60px; height: 38px; border: 2px solid white; border-radius: 4px; overflow: hidden; box-shadow: 2px 2px 10px #000; transition: 0.3s; display: flex; flex-direction: column; }
        .zastava-link:hover { transform: scale(1.2); }
        .srb .b1 { background: #C6363C; height: 33.3%; } .srb .b2 { background: #0C4076; height: 33.3%; } .srb .b3 { background: #FFFFFF; height: 33.3%; }
        .rus .b1 { background: #FFFFFF; height: 33.3%; } .rus .b2 { background: #0033A0; height: 33.3%; } .rus .b3 { background: #DA291C; height: 33.3%; }
        .grk { background: #005BAE; position: relative; } .grk::after { content: "✚"; color: white; display: flex; justify-content: center; align-items: center; height: 100%; font-size: 20px; }
        #datum-prikaz { color: white; font-size: 1.2em; font-weight: bold; text-shadow: 2px 2px 5px #000; }

        .sadrzaj { position: relative; z-index: 5; text-align: center; margin-top: 80px; }
        h1 { font-size: 3.5em; color: #ccff00; text-shadow: 3px 3px 15px #000; margin: 0; }
        h2 { color: #ccff00; font-style: italic; margin: 0 0 30px 0; text-shadow: 2px 2px 10px #000; }
        
        .hartija { display: inline-block; background: #d4b483; padding: 50px 70px; position: relative; background-image: url('https://transparenttextures.com'); box-shadow: inset 0 0 80px #8b5a2b; border: 1px solid rgba(0,0,0,0.1); max-width: 80%; min-height: 100px; height: auto; clip-path: polygon(2% 5%, 15% 1%, 38% 6%, 62% 2%, 82% 7%, 95% 2%, 100% 18%, 97% 42%, 100% 62%, 98% 82%, 100% 97%, 85% 100%, 65% 97%, 42% 100%, 25% 98%, 4% 100%, 1% 85%, 5% 65%, 2% 45%, 6% 25%, 0% 8%); }
        #tekst-misli { color: #8b0000; font-size: 2.1em; font-weight: bold; line-height: 1.4; }

        .knjiga-vetar { margin: 30px auto; width: 300px; height: 210px; position: relative; z-index: 5; perspective: 1200px; }
        .slika-okvir { position: absolute; width: 100%; height: 100%; transition: 0.6s ease; opacity: 0; transform-origin: left center; }
        .slika-okvir img { width: 100%; height: 100%; object-fit: cover; border: 2px solid #8b5a2b; border-radius: 4px; }
        .slika-okvir.aktivna { opacity: 1; transform: rotateY(-5deg); }
        .slika-okvir.odlece { opacity: 0; transform: rotateY(-120deg); }
        .tekst-na-knjizi { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.8em; padding: 6px; text-align: center; font-weight: bold; }

        .donja-zona { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 50px; box-sizing: border-box; z-index: 100; }
        .ikona-kontejner { position: relative; display: flex; flex-direction: column; align-items: center; }
        .prozor { visibility: hidden; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid silver; border-radius: 5px; padding: 5px 12px; color: #ccff00; font-weight: bold; font-size: 0.8em; white-space: nowrap; opacity: 0; transition: 0.1s ease; z-index: 200; pointer-events: none; }
        .ikona-kontejner:hover .prozor { visibility: visible; opacity: 1; }

        .ikona-baza { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 2px 4px 10px black; border: 1px solid rgba(255,255,255,0.3); }
        .ikona-kontejner:hover .ikona-baza { transform: scale(1.15) translateY(-5px); }
        .mail { background: #555; font-size: 32px; color: white; } .viber { background: #7360f2; font-size: 32px; color: white; }
        
        .yt-blok { display: flex; flex-direction: column; gap: 40px; align-items: center; margin-right: 40px; margin-bottom: 10px; }
        .yt1 { background: #FF0000; color: white; font-size: 25px; } .yt2 { background: #8B0000; color: white; font-size: 25px; }
        .insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); font-size: 32px; color: white; }
        .fb { background: #1877F2; font-family: sans-serif; font-weight: bold; font-size: 35px; color: white; }

        @keyframes rotacija { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    </style>
</head>
<body>
    <div class="mrak"></div>
    <div class="blok-levo"><div class="scena"><div class="lopta"><div class="lopta-lice"></div></div></div><div id="sat-prikaz"></div></div>
    
    <div class="blok-desno">
        <div class="zastave">
            <div onclick="window.open('https://crkvenikalendar.com')" class="zastava-link srb"><div class="b1"></div><div class="b2"></div><div class="b3"></div></div>
            <div onclick="window.open('https://saint.gr')" class="zastava-link grk"></div>
            <div onclick="window.open('https://pravoslavie.ru')" class="zastava-link rus"><div class="b1"></div><div class="b2"></div><div class="b3"></div></div>
        </div>
        <div id="datum-prikaz"></div>
    </div>

    <div class="sadrzaj">
        <h1>М. Токовић</h1>
        <h2>Ходочашће на Исток</h2>
        <div class="hartija"><div id="tekst-misli"></div></div>
        <div class="knjiga-vetar">
            <div class="slika-okvir aktivna"><img src="1.JPG"><div class="tekst-na-knjizi">Путопис са аутентичног 14-дневног поклоничког путовања</div></div>
            <div class="slika-okvir"><img src="2.JPG"><div class="tekst-na-knjizi">Публикација садржи 200 страна са око 230 фотографија</div></div>
            <div class="slika-okvir"><img src="3.JPG"><div class="tekst-na-knjizi">Ходочашће на Исток - М. Токовић</div></div>
        </div>
    </div>

    <div class="donja-zona">
        <div style="display: flex; gap: 30px;">
            <div class="ikona-kontejner" onclick="window.open('mailto:topaz032@gmail.com','_blank')"><div class="prozor">topaz032@gmail.com</div><div class="ikona-baza mail">✉</div></div>
            <div class="ikona-kontejner" onclick="window.open('viber://chat?number=%2B381645330444','_blank')"><div class="prozor">Viber</div><div class="ikona-baza viber">📞</div></div>
        </div>
        
        <div class="yt-blok">
            <div class="ikona-kontejner" onclick="window.open('https://youtube.com')"><div class="prozor">YouTube 1</div><div class="ikona-baza yt1">▶</div></div>
            <div class="ikona-kontejner" onclick="window.open('https://youtube.com')"><div class="prozor">YouTube 2</div><div class="ikona-baza yt2">▶</div></div>
        </div>

        <div style="display: flex; gap: 30px;">
            <div class="ikona-kontejner" onclick="window.open('https://instagram.com')"><div class="prozor">Instagram</div><div class="ikona-baza insta">回</div></div>
            <div class="ikona-kontejner" onclick="window.open('https://facebook.com')"><div class="prozor">Facebook</div><div class="ikona-baza fb">f</div></div>
        </div>
    </div>

    <script>
        const misli2026 = {
            "5": { 
                "3": "Кљун се заглавио у решетку канализационог одвода.<br>Уместо да смирено затвори кљун и извуче се, он је све више гордо зевао и усисавао канализацију у себе.",
                "6": "Чудио се зашто стално жури, као мећава — док није схватио да га је ђаво узјахао pa kopitama udara o slabine, a rogovima ga tuče za vrat.",
                "10": "Gledaju unakrsno, a nisu razroki, da bi što više „pohvatali“.",
                "31": "<span onclick='window.open(\"https://youtu.be\",\"_blank\")' style='color:#8b0000; cursor:pointer; text-decoration:underline;'>Тројице</span>"
            },
            "6": { "3": "Друга срећа – М. Т.", "28": "Видели су Виду како на острву Виду Видоја вида." },
            "7": { "30": "Ако математика не лаже... 1 600 000 000 секунди." },
            "10": { "7": "У данашње време могуће су свакакве преваре." }
        };

        let currentImg = 0; const frames = document.querySelectorAll('.slika-okvir');
        function listaj() { if(!frames.length) return; frames[currentImg].classList.remove('aktivna'); frames[currentImg].classList.add('odlece'); currentImg = (currentImg + 1) % frames.length; setTimeout(() => { frames[currentImg].classList.remove('odlece'); frames[currentImg].classList.add('aktivna'); }, 50); }
        setInterval(listaj, 3000);

        function kucajTekst(e, t) {
            let j = 0; e.innerHTML = "";
            let intv = setInterval(() => {
                if (t[j] === "<") { let k = t.indexOf(">", j); e.innerHTML += t.substring(j, k + 1); j = k + 1; }
                else { e.innerHTML += t[j]; j++; }
                if (j >= t.length) clearInterval(intv);
            }, 60);
        }

        function postaviSve() {
            const d = new Date();
            const m = d.getMonth() + 1; const dan = d.getDate();
            const tekst = (misli2026[m] && misli2026[m][dan]) || "Бог постоји за оне који верују,<br>а не постоји за оне који не верују...";
            kucajTekst(document.getElementById('tekst-misli'), tekst);
            document.getElementById('datum-prikaz').innerText = d.toLocaleDateString('sr-RS');
            document.getElementById('sat-prikaz').innerText = new Date().toLocaleTimeString('sr-RS');
        }
        setInterval(() => { document.getElementById('sat-prikaz').innerText = new Date().toLocaleTimeString('sr-RS'); }, 1000);
        postaviSve();
    </script>
</body>
</html>
